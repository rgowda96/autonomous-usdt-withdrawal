name: Autonomous Loop

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch: {}   # manual trigger button

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/blissful-davinci-Jw9jf
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      # Install the Claude Code CLI (or any other agent runner you prefer).
      - name: Install agent runner
        run: |
          # Anthropic's official CLI; replace with your preferred runner.
          npm install -g @anthropic-ai/claude-code || echo "claude-code install skipped (use API directly)"

      - name: Run one tick
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set; skipping tick. Add it under Repo Settings > Secrets > Actions."
            exit 0
          fi
          chmod +x ./scripts/loop-tick.sh
          ./scripts/loop-tick.sh
