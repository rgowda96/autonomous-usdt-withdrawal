services:
  - type: web
    name: stablepay-demo
    runtime: docker
    plan: free
    region: singapore
    branch: claude/blissful-davinci-Jw9jf
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: /data/stablepay.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /healthz
